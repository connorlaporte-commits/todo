<style>
:root {
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-dark:#0F6E56;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-dark:#3C3489;
  --pink:#D4537E;--pink-bg:#FBEAF0;--pink-dark:#72243E;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-dark:#0C447C;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-dark:#791F1F;
  --paper:#FDFAF4;--ink:#1E1C18;--muted:#888880;--border:#E2DDD0;--dot:#DDD8C8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,var(--dot) 1px,transparent 1px);background-size:20px 20px;}
header{position:sticky;top:0;z-index:100;background:rgba(253,250,244,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.site-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.global-progress{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
.global-bar{width:140px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.global-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width 0.4s ease;}
.global-count{font-weight:600;color:var(--ink);}
.sync-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background 0.3s;}
.sync-dot.ok{background:var(--teal);}
.sync-dot.err{background:var(--red);}
.sync-dot.loading{background:#f0a500;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

.cat-reorder{position:relative;z-index:1;display:flex;gap:8px;padding:12px 24px 0;align-items:center;flex-wrap:wrap;}
.cat-reorder-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.07em;text-transform:uppercase;margin-right:4px;}
.cat-chips{display:flex;gap:8px;flex-wrap:wrap;}
.cat-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:white;font-size:12px;font-weight:500;cursor:grab;color:var(--ink);transition:box-shadow 0.15s;user-select:none;}
.cat-chip:hover{box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.cat-chip.dragging{opacity:0.4;}
.cat-chip.drag-over-chip{border-color:#999;background:#F0EDE8;}

.tabs-row{position:relative;z-index:1;display:flex;gap:8px;padding:12px 24px 0;overflow-x:auto;flex-wrap:wrap;}
.tab-btn{padding:8px 18px;border-radius:24px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s;white-space:nowrap;}
.tab-btn:hover{border-color:#bbb;color:var(--ink);}
.tab-btn.active[data-sec="yard"]{background:var(--teal-bg);color:var(--teal-dark);border-color:var(--teal);}
.tab-btn.active[data-sec="house"]{background:var(--purple-bg);color:var(--purple-dark);border-color:var(--purple);}
.tab-btn.active[data-sec="checkout"]{background:var(--pink-bg);color:var(--pink-dark);border-color:var(--pink);}
.tab-btn.active[data-sec="math"]{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue);}
.tab-btn.active[data-sec="history"]{background:var(--red-bg);color:var(--red-dark);border-color:var(--red);}

main{position:relative;z-index:1;padding:20px 24px 60px;max-width:900px;}
.loading-screen{text-align:center;padding:60px 24px;color:var(--muted);font-size:15px;}
.loading-screen .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

.section{display:none;}
.section.active{display:block;}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid;}
.section-header .icon{font-size:24px;}
.section-header h1{font-family:'Fraunces',serif;font-size:28px;font-weight:700;}
.section-header .sec-count{margin-left:auto;font-size:13px;color:var(--muted);}
.sec-progress{height:5px;border-radius:3px;background:var(--border);margin-bottom:24px;overflow:hidden;}
.sec-progress-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}

#sec-yard .section-header{border-color:var(--teal);color:var(--teal-dark);}
#sec-yard .sec-progress-fill{background:var(--teal);}
#sec-house .section-header{border-color:var(--purple);color:var(--purple-dark);}
#sec-house .sec-progress-fill{background:var(--purple);}
#sec-checkout .section-header{border-color:var(--pink);color:var(--pink-dark);}
#sec-checkout .sec-progress-fill{background:var(--pink);}
#sec-math .section-header{border-color:var(--blue);color:var(--blue-dark);}
#sec-math .sec-progress-fill{background:var(--blue);}
#sec-history .section-header{border-color:var(--red);color:var(--red-dark);}
#sec-history .sec-progress-fill{background:var(--red);}

.group{margin-bottom:28px;}
.group-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-left:2px;}
.task-list{display:flex;flex-direction:column;gap:5px;}
.task{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:white;cursor:grab;transition:box-shadow 0.15s,opacity 0.15s,background 0.1s;user-select:none;}
.task:hover{background:#FAFAF7;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.task.dragging{opacity:0.35;}
.task.drag-over{border-style:dashed;border-color:#aaa;background:#F5F5F0;}
.task.done .task-label{text-decoration:line-through;color:var(--muted);}
.drag-handle{color:#CCC;font-size:18px;cursor:grab;flex-shrink:0;line-height:1;}
.drag-handle:hover{color:#999;}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:transparent;}
.cb svg{display:none;}
.cb.checked svg{display:block;}
#sec-yard .cb{border-color:var(--teal);}
#sec-yard .cb.checked{background:var(--teal);border-color:var(--teal);}
#sec-house .cb{border-color:var(--purple);}
#sec-house .cb.checked{background:var(--purple);border-color:var(--purple);}
#sec-checkout .cb{border-color:var(--pink);}
#sec-checkout .cb.checked{background:var(--pink);border-color:var(--pink);}
#sec-math .cb{border-color:var(--blue);}
#sec-math .cb.checked{background:var(--blue);border-color:var(--blue);}
#sec-history .cb{border-color:var(--red);}
#sec-history .cb.checked{background:var(--red);border-color:var(--red);}
.task-label{font-size:15px;flex:1;line-height:1.4;}
.task-delete{opacity:0;background:none;border:none;cursor:pointer;color:#CCC;font-size:16px;padding:2px 4px;border-radius:4px;transition:opacity 0.1s,color 0.1s;flex-shrink:0;}
.task:hover .task-delete{opacity:1;}
.task-delete:hover{color:#E24B4A;}
.add-row{display:flex;gap:8px;margin-top:10px;}
.add-input{flex:1;padding:9px 14px;border-radius:10px;border:1.5px dashed var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color 0.15s;}
.add-input:focus{border-style:solid;border-color:#aaa;}
.add-input::placeholder{color:#BDB9B0;}
.add-btn{padding:9px 16px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:white;transition:opacity 0.15s;}
.add-btn:hover{opacity:0.85;}
#sec-yard .add-btn{background:var(--teal);}
#sec-house .add-btn{background:var(--purple);}
#sec-checkout .add-btn{background:var(--pink);}
#sec-math .add-btn{background:var(--blue);}
#sec-history .add-btn{background:var(--red);}
</style>
</head>

// ── State ────────────────────────────────────────────────
let tasks = [];   // array of task objects from supabase
let secOrder = JSON.parse(localStorage.getItem('sec-order') || '["yard","house","checkout","math","history"]');
let activeTab = localStorage.getItem('active-tab') || 'yard';
let taskDragSrc = null, catDragSrc = null;

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  setSyncStatus('loading', 'Connecting...');
  const { data, error } = await sb.from('tasks').select('*').order('position');
  if (error) { setSyncStatus('err', 'Error loading'); console.error(error); return; }

  if (data.length === 0) {
    // Seed the database
    setSyncStatus('loading', 'Setting up...');
    const { error: insertErr } = await sb.from('tasks').insert(DEFAULT_TASKS);
    if (insertErr) { setSyncStatus('err', 'Seed failed'); console.error(insertErr); return; }
    const { data: seeded } = await sb.from('tasks').select('*').order('position');
    tasks = seeded || [];
  } else {
    tasks = data;
  }

  setSyncStatus('ok', 'Synced');
  render();
}

// ── Helpers ──────────────────────────────────────────────
function tasksFor(sec) { return tasks.filter(t => t.sec === sec).sort((a,b) => a.position - b.position); }
function tasksForGroup(sec, grp) { return tasks.filter(t => t.sec === sec && t.grp === grp).sort((a,b) => a.position - b.position); }
function groupsFor(sec) { return [...new Set(tasksFor(sec).map(t => t.grp))]; }
function totalAll()  { return tasks.length; }
function doneAll()   { return tasks.filter(t => t.done).length; }
function totalSec(sec) { return tasksFor(sec).length; }
function doneSec(sec)  { return tasksFor(sec).filter(t => t.done).length; }

// ── Render ───────────────────────────────────────────────
function render() {
  renderHeader(); renderCatChips(); renderTabs(); renderSections();
}

function renderHeader() {
  const total = totalAll(), done = doneAll();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('globalFill').style.width = pct + '%';
  document.getElementById('globalCount').textContent = `${done}/${total} done`;
}

function renderCatChips() {
  const el = document.getElementById('catChips');
  el.innerHTML = '';
  secOrder.forEach(sec => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip'; chip.textContent = ICONS[sec] + ' ' + LABELS[sec];
    chip.draggable = true; chip.dataset.sec = sec;
    chip.addEventListener('dragstart', e => { catDragSrc = sec; chip.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    chip.addEventListener('dragover', e => { e.preventDefault(); document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('drag-over-chip')); chip.classList.add('drag-over-chip'); });
    chip.addEventListener('drop', e => {
      e.preventDefault();
      if (!catDragSrc || catDragSrc === sec) return;
      const from = secOrder.indexOf(catDragSrc), to = secOrder.indexOf(sec);
      secOrder.splice(from,1); secOrder.splice(to,0,catDragSrc);
      localStorage.setItem('sec-order', JSON.stringify(secOrder));
      catDragSrc = null; render();
    });
    chip.addEventListener('dragend', () => { chip.classList.remove('dragging'); document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('drag-over-chip')); catDragSrc = null; });
    el.appendChild(chip);
  });
}

function renderTabs() {
  const row = document.getElementById('tabsRow');
  row.innerHTML = '';
  secOrder.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (sec === activeTab ? ' active' : '');
    btn.dataset.sec = sec;
    btn.textContent = ICONS[sec] + ' ' + LABELS[sec];
    btn.onclick = () => { activeTab = sec; localStorage.setItem('active-tab', sec); render(); };
    row.appendChild(btn);
  });
}

function renderSections() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  secOrder.forEach(sec => {
    const total = totalSec(sec), done = doneSec(sec);
    const pct = total ? Math.round(done/total*100) : 0;
    const div = document.createElement('div');
    div.className = 'section' + (sec === activeTab ? ' active' : '');
    div.id = 'sec-' + sec;
    div.innerHTML = `
      <div class="sec-progress"><div class="sec-progress-fill" style="width:${pct}%"></div></div>
      <div class="section-header">
        <span class="icon">${ICONS[sec]}</span>
        <h1>${LABELS[sec]}</h1>
        <span class="sec-count">${done}/${total} done</span>
      </div>`;

    groupsFor(sec).forEach(grp => {
      const groupEl = document.createElement('div');
      groupEl.className = 'group';
      groupEl.innerHTML = `<div class="group-label">${grp}</div>`;
      const list = document.createElement('div');
      list.className = 'task-list';
      list.dataset.sec = sec; list.dataset.grp = grp;
      tasksForGroup(sec, grp).forEach(task => list.appendChild(makeTaskEl(task)));

      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      addRow.innerHTML = `<input class="add-input" placeholder="Add a task to ${grp}..."><button class="add-btn">+ Add</button>`;
      const inp = addRow.querySelector('.add-input');
      const doAdd = () => addTask(sec, grp, inp);
      addRow.querySelector('.add-btn').onclick = doAdd;
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

      groupEl.appendChild(list); groupEl.appendChild(addRow);
      div.appendChild(groupEl);
    });
    main.appendChild(div);
  });
}

function makeTaskEl(task) {
  const el = document.createElement('div');
  el.className = 'task' + (task.done ? ' done' : '');
  el.draggable = true;
  el.dataset.id = task.id;
  el.innerHTML = `
    <span class="drag-handle">⠿</span>
    <div class="cb ${task.done ? 'checked' : ''}">
      <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="task-label">${task.text}</span>
    <button class="task-delete" title="Delete">✕</button>`;

  el.querySelector('.cb').onclick = () => toggleTask(task.id, !task.done);
  el.querySelector('.task-delete').onclick = () => deleteTask(task.id);

  el.addEventListener('dragstart', e => { taskDragSrc = task.id; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
  el.addEventListener('dragover', e => { e.preventDefault(); document.querySelectorAll('.task.drag-over').forEach(x=>x.classList.remove('drag-over')); el.classList.add('drag-over'); });
  el.addEventListener('drop', async e => {
    e.preventDefault();
    if (!taskDragSrc || taskDragSrc === task.id) return;
    const srcTask = tasks.find(t => t.id === taskDragSrc);
    const dstTask = task;
    if (srcTask.sec !== dstTask.sec || srcTask.grp !== dstTask.grp) return;
    // Reorder locally
    const grpTasks = tasksForGroup(srcTask.sec, srcTask.grp);
    const srcIdx = grpTasks.findIndex(t => t.id === taskDragSrc);
    const dstIdx = grpTasks.findIndex(t => t.id === dstTask.id);
    grpTasks.splice(srcIdx, 1); grpTasks.splice(dstIdx, 0, srcTask);
    grpTasks.forEach((t, i) => { const found = tasks.find(x => x.id === t.id); if (found) found.position = i; });
    taskDragSrc = null; render();
    // Persist positions
    setSyncStatus('loading', 'Saving...');
    await Promise.all(grpTasks.map((t, i) => sb.from('tasks').update({position: i}).eq('id', t.id)));
    setSyncStatus('ok', 'Synced');
  });
  el.addEventListener('dragend', () => { el.classList.remove('dragging'); document.querySelectorAll('.task.drag-over').forEach(x=>x.classList.remove('drag-over')); taskDragSrc = null; });
  return el;
}

async function toggleTask(id, done) {
  tasks.find(t => t.id === id).done = done;
  render();
  setSyncStatus('loading', 'Saving...');
  await sb.from('tasks').update({done}).eq('id', id);
  setSyncStatus('ok', 'Synced');
}

async function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  setSyncStatus('loading', 'Saving...');
  await sb.from('tasks').delete().eq('id', id);
  setSyncStatus('ok', 'Synced');
}

async function addTask(sec, grp, input) {
  const text = input.value.trim();
  if (!text) return;
  const grpTasks = tasksForGroup(sec, grp);
  const position = grpTasks.length;
  setSyncStatus('loading', 'Saving...');
  const { data, error } = await sb.from('tasks').insert({sec, grp, text, done: false, position}).select().single();
  if (error) { setSyncStatus('err', 'Save failed'); return; }
  tasks.push(data);
  input.value = '';
  setSyncStatus('ok', 'Synced');
  render();
}

init();
</script>
</body>
</html>
